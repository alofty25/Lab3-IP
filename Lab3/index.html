<!DocType html>
<html>
   <head>
      <title>Calculator</title>
     <link rel="stylesheet" href = "style.css">
   </head>
   <body>
    <div id="calculator" class="main-frame">
        <div class="title">
            <h1><b>Calculator :)</b></h1>
        </div>
        <div class="screen" >
            <H2 id = "main-screen" class="main-screen">0</H2>
            <H1 id = "result" class = "result">0</H1>
        </div>
        <div class="board">
            <button id ="AC" class="operator">
                AC
            </button>
            <button id ="C" class="operator">
                C
            </button>
            <button id ="mod" class="operator">
                %
            </button>
            <button id ="div" class="operator">
                /
            </button>

            <button id ="seven">
                7
            </button>
            <button id ="eight">
                8
            </button>
            <button id ="nine">
                9
            </button>
            <button id ="mul" class="operator">
                *
            </button>

            <button id ="four">
                4
            </button>
            <button id ="five">
                5
            </button>
            <button id ="six">
                6
            </button>
            <button id ="sub" class="operator">
                -
            </button>

            <button id ="one">
                1
            </button>
            <button id ="two">
                2
            </button>
            <button id ="three">
                3
            </button>
            <button id ="plus" class="operator">
                +
            </button>

            <button id ="zero" class="zero">
                0
            </button>
            <button id ="dot" >
                .
            </button>
            <button id ="equal" class="equal">
                =
            </button>


        </div>
    </div>

   </body>
    <script src="script.js"></script>

</html>
